name: finance-bot CI

on:
  push:
    paths:
      - 'finance-bot/**'
      - '.github/workflows/finance-bot-ci.yml'
  pull_request:
    paths:
      - 'finance-bot/**'
      - '.github/workflows/finance-bot-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: finance-bot

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: finance-bot/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: pytest -q
